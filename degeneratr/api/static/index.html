<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>degeneratr</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css?v=19" />
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js" defer></script>
  <script src="/app.js?v=19" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true"></span>
      <div class="brand-text">
        <span class="logo">degeneratr</span>
        <span class="slogan">Where Degens Evolve.</span>
      </div>
    </div>
    <div class="market-status" id="mkt-status">
      <span class="mkt-dot"></span>
      <div class="mkt-text">
        <span class="mkt-label">US Market</span>
        <span class="mkt-clock" id="mkt-clock">—</span>
      </div>
    </div>
  </header>

  <main>
    <!-- ============ CHARTS TAB ============ -->
    <section id="tab-charts" class="tabpane active">
      <div class="charts-bar">
        <div class="charts-controls">
          <label class="field inline">Candles
            <select id="c-period">
              <option value="5m" selected>5 minutes</option>
              <option value="15m">15 minutes</option>
            </select>
          </label>
          <label class="field inline">Source
            <select id="c-source">
              <option value="store" selected>Local store</option>
              <option value="live">Live (Tiger)</option>
            </select>
          </label>
          <span class="zoom" title="Strategy runs on 15m; candles shown at the selected size">
            <span class="zoom-lbl">Zoom</span>
            <button data-zoom="1" class="active">1D</button>
            <button data-zoom="3">3D</button>
            <button data-zoom="5">1W</button>
            <button data-zoom="0">Max</button>
          </span>
          <span class="toggles">
            <label><input type="checkbox" id="t-ema" checked /><span class="sw" style="background:#4c8dff"></span><span class="sw" style="background:#e0a23c"></span> EMA 9/21</label>
            <label><input type="checkbox" id="t-vwap" checked /><span class="sw" style="background:#b06cf0"></span> VWAP</label>
            <label><input type="checkbox" id="t-bb" /><span class="sw" style="background:rgba(146,155,171,0.75)"></span> Bollinger</label>
            <label><input type="checkbox" id="t-sig" /><span class="sw arrow" style="color:#3a7d63">&#9650;</span><span class="sw arrow" style="color:#a14647">&#9660;</span> Signals</label>
            <label><input type="checkbox" id="t-trades" checked /><span class="sw dot" style="background:#4c8dff"></span> Trades</label>
          </span>
          <button id="charts-btn" class="primary sm"><span class="btn-label">Refresh</span></button>
          <button id="live-btn" class="live-toggle"><span class="live-dot"></span><span class="live-label">Go live</span></button>
        </div>
        <p id="charts-status" class="status"></p>
      </div>
      <div id="charts-grid" class="charts-grid"></div>
      <div id="charts-empty" class="empty"><i class="empty-icon">&#9650;</i><p>Loading watchlist charts…</p></div>
    </section>

    </main>
</body>
</html>
